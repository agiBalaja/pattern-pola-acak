<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pattern Lock 4D | 8 Angka Acak + Pola Otomatis</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DV25BYV3TL"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-DV25BYV3TL');
</script>
<style>
  * {
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #eef2f5;
    margin: 0;
    padding: 20px;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1e466e;
  }

  /* Panel Kontrol */
  .control-panel {
    background: linear-gradient(135deg, #1e2a3a, #0f1724);
    border-radius: 32px;
    padding: 20px 24px;
    margin-bottom: 30px;
    color: white;
    box-shadow: 0 12px 24px rgba(0,0,0,0.2);
    text-align: center;
  }

  .seed-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    align-items: center;
    margin: 12px 0;
  }

  .seed-area label {
    font-weight: 600;
  }

  #seedInput {
    padding: 8px 16px;
    border-radius: 40px;
    border: none;
    font-size: 1rem;
    width: 180px;
    text-align: center;
    background: #f0f3f8;
    color: #1f3a5f;
    font-weight: bold;
  }

  .btn {
    background: #ff9800;
    border: none;
    padding: 8px 20px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    color: #1e2a3a;
  }

  .btn-primary {
    background: #3f51b5;
    color: white;
  }

  .btn:hover {
    transform: scale(0.97);
    opacity: 0.9;
  }

  .info-text {
    font-size: 0.85rem;
    margin-top: 12px;
    opacity: 0.9;
    background: #00000033;
    display: inline-block;
    padding: 6px 14px;
    border-radius: 50px;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 30px;
    justify-items: center;
    margin-top: 10px;
  }

  .pattern {
    background: white;
    border-radius: 32px;
    box-shadow: 0 12px 24px rgba(0,0,0,0.1);
    padding: 16px 12px 20px 12px;
    transition: transform 0.2s;
    width: 300px;
  }

  .pattern:hover {
    transform: translateY(-4px);
  }

  .pattern-title {
    text-align: center;
    font-weight: bold;
    font-size: 1.2rem;
    color: #2c3e66;
    margin-bottom: 6px;
  }

  .pattern-4d {
    text-align: center;
    font-size: 1.5rem;
    font-family: monospace;
    font-weight: bold;
    background: #e0e7ff;
    display: inline-block;
    width: 100%;
    padding: 4px 0;
    border-radius: 30px;
    margin-bottom: 10px;
    color: #1e466e;
  }

  .reset-btn {
    display: block;
    margin: 8px auto 12px auto;
    padding: 5px 16px;
    border: none;
    border-radius: 60px;
    background: #f44336;
    color: white;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  .reset-btn:hover {
    background: #d32f2f;
  }

  .wrapper {
    position: relative;
    width: 280px;
    height: 320px;
    margin: 0 auto;
    touch-action: none;
    cursor: crosshair;
  }

  svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  .angka-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(3, 80px);
    grid-template-rows: repeat(4, 80px);
    gap: 12px;
    justify-content: center;
    align-content: start;
    z-index: 2;
  }

  .angka {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #f0f3f8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    color: #1f3a5f;
    box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    transition: all 0.1s ease;
    cursor: grab;
    touch-action: none;
    border: 2px solid transparent;
  }

  .angka:active {
    cursor: grabbing;
  }

  .angka.active {
    background: #2196f3;
    color: white;
    box-shadow: 0 0 0 3px rgba(33,150,243,0.4);
    transform: scale(0.96);
  }

  .nol {
    grid-column: 2 / 3;
    grid-row: 4 / 5;
  }

  .angka[data-angka="1"] { grid-row: 1; grid-column: 1; }
  .angka[data-angka="2"] { grid-row: 1; grid-column: 2; }
  .angka[data-angka="3"] { grid-row: 1; grid-column: 3; }
  .angka[data-angka="4"] { grid-row: 2; grid-column: 1; }
  .angka[data-angka="5"] { grid-row: 2; grid-column: 2; }
  .angka[data-angka="6"] { grid-row: 2; grid-column: 3; }
  .angka[data-angka="7"] { grid-row: 3; grid-column: 1; }
  .angka[data-angka="8"] { grid-row: 3; grid-column: 2; }
  .angka[data-angka="9"] { grid-row: 3; grid-column: 3; }
  .angka.nol { grid-row: 4; grid-column: 2; margin-top: 4px; }

  @media (max-width: 700px) {
    .angka {
      width: 70px;
      height: 70px;
      font-size: 24px;
    }
    .wrapper {
      width: 260px;
      height: 300px;
    }
    .angka-container {
      gap: 12px;
    }
  }
</style>
</head>
<body>

<h2>🔐 Pattern Lock 4D | 8 Angka Acak + Pola Otomatis</h2>

<div class="control-panel">
  <div style="font-size: 1.2rem; font-weight: 600;">🎲 GENERATOR 8 ANGKA 4D + POLA 🎲</div>
  <div class="seed-area">
    <label>🔢 SEED (angka):</label>
    <input type="number" id="seedInput" placeholder="contoh: 12345" value="2025" step="1">
    <button class="btn btn-primary" id="generateBtn">✨ Generate & Gambar Pola</button>
  </div>
  <div class="info-text">
    ⚡ Seed berupa angka (bilangan bulat). Setiap kali klik tombol, akan dihasilkan <strong>8 angka 4D acak</strong> (0000–9999).<br>
    Setiap angka akan digambar sebagai pola pada pattern lock di bawah (urutan digit unik).
  </div>
</div>

<div class="container" id="container"></div>

<script>
  // --------------------------------------------------------------
  // 1. BUAT 8 PATTERN LOCK
  // --------------------------------------------------------------
  const container = document.getElementById("container");
  const TOTAL_PATTERNS = 8;

  for (let i = 1; i <= TOTAL_PATTERNS; i++) {
    container.insertAdjacentHTML("beforeend", `
      <div class="pattern" data-pattern-idx="${i}">
        <div class="pattern-title">Pattern ${i}</div>
        <div class="pattern-4d" id="fourdLabel-${i}">----</div>
        <button class="reset-btn" data-reset="${i}">⟳ Reset Pola</button>
        <div class="wrapper">
          <svg width="280" height="320" viewBox="0 0 280 320"></svg>
          <div class="angka-container">
            ${[1,2,3,4,5,6,7,8,9].map(n => `<div class="angka" data-angka="${n}">${n}</div>`).join("")}
            <div class="angka nol" data-angka="0">0</div>
          </div>
        </div>
      </div>
    `);
  }

  // --------------------------------------------------------------
  // 2. RANDOM SYSTEM (berbasis seed angka integer)
  // --------------------------------------------------------------
  // Multiplicative congruential generator (simple, deterministic)
  function lcg(seed) {
    let state = seed >>> 0;
    return function() {
      state = (state * 1664525 + 1013904223) >>> 0;
      return state;
    };
  }

  // Menghasilkan angka 4D (0000-9999) berdasarkan seed dan index pattern
  function generateFourD(seedNumber, patternIndex) {
    // Kombinasi seed dengan index untuk menghasilkan variasi
    const combinedSeed = (seedNumber ^ (patternIndex * 0x9e3779b9)) >>> 0;
    const rng = lcg(combinedSeed);
    // Ambil beberapa nilai untuk keacakan yang lebih baik
    let val = rng();
    val = (val + rng()) >>> 0;
    const raw = val % 10000;
    return raw.toString().padStart(4, '0');
  }

  // Ubah angka 4D menjadi pola urutan digit unik (hapus duplikat, pertahankan urutan pertama)
  function uniquePatternFromFourD(fourD) {
    const digits = fourD.split('');
    const seen = new Set();
    const unique = [];
    for (let d of digits) {
      if (!seen.has(d)) {
        seen.add(d);
        unique.push(d);
      }
    }
    return unique;
  }

  // --------------------------------------------------------------
  // 3. SETUP PATTERN LOCK (masing-masing pattern punya controller)
  // --------------------------------------------------------------
  const patternControllers = [];

  function setupPattern(patternElement, patternIndex) {
    const wrapper = patternElement.querySelector(".wrapper");
    const svg = patternElement.querySelector("svg");
    const angkaElements = [...patternElement.querySelectorAll(".angka")];
    const resetBtn = patternElement.querySelector(".reset-btn");
    
    // State pattern
    let points = [];          // { value, x, y }
    let isDragging = false;
    let currentTempPoint = null;
    
    let globalMouseMove = null;
    let globalMouseUp = null;
    let globalTouchMove = null;
    let globalTouchEnd = null;
    
    // Helper: reset pattern state
    function resetPatternState() {
      points = [];
      currentTempPoint = null;
      angkaElements.forEach(el => el.classList.remove("active"));
      svg.innerHTML = "";
      isDragging = false;
    }
    
    // Tambah titik baru (angka) ke pola
    function addNumberInternal(numberEl) {
      if (!numberEl) return false;
      const value = numberEl.dataset.angka;
      if (points.some(p => p.value === value)) return false;
      const center = getCenterRelative(numberEl, wrapper);
      points.push({ value: value, x: center.x, y: center.y });
      numberEl.classList.add("active");
      return true;
    }
    
    // Gambar ulang garis
    function redraw() {
      svg.innerHTML = "";
      if (!points.length) return;
      for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i];
        const p2 = points[i+1];
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", p1.x);
        line.setAttribute("y1", p1.y);
        line.setAttribute("x2", p2.x);
        line.setAttribute("y2", p2.y);
        line.setAttribute("stroke", "#2196f3");
        line.setAttribute("stroke-width", "4");
        line.setAttribute("stroke-linecap", "round");
        svg.appendChild(line);
      }
      if (currentTempPoint && points.length > 0) {
        const last = points[points.length - 1];
        const tempLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        tempLine.setAttribute("x1", last.x);
        tempLine.setAttribute("y1", last.y);
        tempLine.setAttribute("x2", currentTempPoint.x);
        tempLine.setAttribute("y2", currentTempPoint.y);
        tempLine.setAttribute("stroke", "#64b5f6");
        tempLine.setAttribute("stroke-width", "4");
        tempLine.setAttribute("stroke-linecap", "round");
        tempLine.setAttribute("stroke-dasharray", "6 4");
        svg.appendChild(tempLine);
      }
    }
    
    function getCenterRelative(element, wrapperEl) {
      const elemRect = element.getBoundingClientRect();
      const wrapRect = wrapperEl.getBoundingClientRect();
      const x = elemRect.left + elemRect.width / 2 - wrapRect.left;
      const y = elemRect.top + elemRect.height / 2 - wrapRect.top;
      return { x, y };
    }
    
    function getNumberAtPoint(clientX, clientY) {
      for (let el of angkaElements) {
        const rect = el.getBoundingClientRect();
        if (clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom) {
          return el;
        }
      }
      return null;
    }
    
    function handleDragMove(clientX, clientY) {
      if (!isDragging) return;
      const wrapRect = wrapper.getBoundingClientRect();
      const relativeX = clientX - wrapRect.left;
      const relativeY = clientY - wrapRect.top;
      currentTempPoint = { x: relativeX, y: relativeY };
      const hitNumber = getNumberAtPoint(clientX, clientY);
      if (hitNumber && !hitNumber.classList.contains("active")) {
        addNumberInternal(hitNumber);
        const newWrapRect = wrapper.getBoundingClientRect();
        currentTempPoint = { x: clientX - newWrapRect.left, y: clientY - newWrapRect.top };
      }
      redraw();
    }
    
    function endDrag() {
      if (!isDragging) return;
      currentTempPoint = null;
      redraw();
      isDragging = false;
      if (globalMouseMove) window.removeEventListener("mousemove", globalMouseMove);
      if (globalMouseUp) window.removeEventListener("mouseup", globalMouseUp);
      if (globalTouchMove) window.removeEventListener("touchmove", globalTouchMove);
      if (globalTouchEnd) window.removeEventListener("touchend", globalTouchEnd);
      globalMouseMove = null;
      globalMouseUp = null;
      globalTouchMove = null;
      globalTouchEnd = null;
    }
    
    function startDragFromNumber(startNumberEl, clientX, clientY) {
      if (isDragging) endDrag();
      resetPatternState();
      const firstCenter = getCenterRelative(startNumberEl, wrapper);
      points = [{ value: startNumberEl.dataset.angka, x: firstCenter.x, y: firstCenter.y }];
      startNumberEl.classList.add("active");
      isDragging = true;
      currentTempPoint = { x: firstCenter.x, y: firstCenter.y };
      redraw();
      
      globalMouseMove = (e) => {
        e.preventDefault();
        handleDragMove(e.clientX, e.clientY);
      };
      globalMouseUp = (e) => {
        e.preventDefault();
        endDrag();
      };
      globalTouchMove = (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        if (touch) handleDragMove(touch.clientX, touch.clientY);
      };
      globalTouchEnd = (e) => {
        e.preventDefault();
        endDrag();
      };
      window.addEventListener("mousemove", globalMouseMove);
      window.addEventListener("mouseup", globalMouseUp);
      window.addEventListener("touchmove", globalTouchMove, { passive: false });
      window.addEventListener("touchend", globalTouchEnd);
    }
    
    // Programmatic set pattern dari array digit
    function setPatternFromDigitArray(digitArray) {
      if (isDragging) endDrag();
      resetPatternState();
      if (!digitArray || digitArray.length === 0) return;
      const newPoints = [];
      for (let digit of digitArray) {
        const el = angkaElements.find(ae => ae.dataset.angka === digit);
        if (!el) continue;
        const center = getCenterRelative(el, wrapper);
        newPoints.push({ value: digit, x: center.x, y: center.y });
        el.classList.add("active");
      }
      points = newPoints;
      currentTempPoint = null;
      redraw();
    }
    
    // Event listener setiap angka
    angkaElements.forEach(angka => {
      angka.addEventListener("mousedown", (e) => {
        e.preventDefault();
        e.stopPropagation();
        startDragFromNumber(angka, e.clientX, e.clientY);
      });
      angka.addEventListener("touchstart", (e) => {
        e.preventDefault();
        e.stopPropagation();
        const touch = e.touches[0];
        if (touch) startDragFromNumber(angka, touch.clientX, touch.clientY);
      });
    });
    
    resetBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (isDragging) endDrag();
      resetPatternState();
      // juga update label 4D menjadi kosong
      const labelDiv = patternElement.querySelector(".pattern-4d");
      if (labelDiv) labelDiv.innerText = "----";
    });
    
    wrapper.addEventListener("dragstart", (e) => e.preventDefault());
    wrapper.addEventListener("selectstart", (e) => e.preventDefault());
    
    // Simpan controller
    patternControllers.push({
      setPattern: setPatternFromDigitArray,
      reset: resetPatternState,
      setFourDLabel: (fourD) => {
        const labelDiv = patternElement.querySelector(".pattern-4d");
        if (labelDiv) labelDiv.innerText = fourD;
      }
    });
  }
  
  // Inisialisasi semua pattern
  document.querySelectorAll(".pattern").forEach((pattern, idx) => {
    setupPattern(pattern, idx);
  });
  
  // --------------------------------------------------------------
  // 4. GENERATE 8 ANGKA DAN GAMBAR POLA PADA MASING-MASING PATTERN
  // --------------------------------------------------------------
  function generateAndDraw() {
    let seedVal = seedInput.value.trim();
    if (seedVal === "") seedVal = "0";
    let seedNumber = parseInt(seedVal, 10);
    if (isNaN(seedNumber)) seedNumber = 0;
    
    const fourDNumbers = [];
    for (let i = 0; i < TOTAL_PATTERNS; i++) {
      fourDNumbers.push(generateFourD(seedNumber, i));
    }
    
    for (let i = 0; i < patternControllers.length; i++) {
      const fourD = fourDNumbers[i];
      const pattern = uniquePatternFromFourD(fourD);
      patternControllers[i].setPattern(pattern);
      patternControllers[i].setFourDLabel(fourD);
    }
    console.log("Generated 8 numbers:", fourDNumbers);
  }
  
  // Tombol generate
  const generateBtn = document.getElementById("generateBtn");
  const seedInput = document.getElementById("seedInput");
  generateBtn.addEventListener("click", generateAndDraw);
  
  // Generate awal saat load
  setTimeout(() => {
    generateAndDraw();
  }, 100);
  
  // Pencegahan scroll saat drag
  document.querySelectorAll(".angka-container").forEach(cont => {
    cont.addEventListener("touchstart", (e) => {
      if (e.target.closest(".angka")) e.preventDefault();
    }, { passive: false });
  });
  
  console.log("✅ Siap! Masukkan seed angka dan klik Generate untuk menampilkan 8 angka 4D beserta polanya.");
</script>

</body>
</html>
